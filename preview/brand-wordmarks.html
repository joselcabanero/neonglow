<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Logo Lockups</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);color:var(--ink);}
  .wrap{padding:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .box{display:flex;align-items:center;justify-content:center;height:100px;border:1px solid rgba(10,10,10,0.15);padding:14px;}
  .paper{background:#ffffff;}
  .dark{background:#0a0a0a;}
  .accent{background:#7BF076;}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);text-align:center;margin-top:6px;}
  .col{display:flex;flex-direction:column;}
  img{max-height:56px;max-width:100%;}
</style></head><body>
<div class="wrap">
  <div class="col"><div class="box paper"><img src="../assets/accelera-wordmark-primary.png"></div><div class="cap">primary · paper</div></div>
  <div class="col"><div class="box dark"><img src="../assets/accelera-wordmark-inverted.png"></div><div class="cap">inverted · ink</div></div>
  <div class="col"><div class="box accent"><img src="../assets/accelera-wordmark-ink.png"></div><div class="cap">ink · accent</div></div>
</div>
</body></html>
