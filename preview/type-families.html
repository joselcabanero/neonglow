<!-- @dsCard group="Type" viewport="700x200" name="Type families" subtitle="Ubuntu + Ubuntu Mono" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Type Families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);font-family:var(--font-sans);color:var(--ink);}
  .wrap{padding:24px 28px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .c{padding:22px 24px;background:var(--paper-2);}
  .k{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:500;margin-bottom:12px;}
  .s{font-size:52px;font-weight:500;letter-spacing:-0.025em;line-height:1;}
  .sm{font-family:var(--font-mono);font-size:48px;letter-spacing:-0.015em;line-height:1;font-weight:400;}
  .w{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);margin-top:14px;}
</style></head><body>
<div class="wrap">
  <div class="c"><div class="k">Display / Body</div><div class="s">Ubuntu</div><div class="w">300 · 400 · 500 · 700</div></div>
  <div class="c"><div class="k">Numeric / Technical</div><div class="sm">Ubuntu Mono</div><div class="w">400 · 700</div></div>
</div>
</body></html>
