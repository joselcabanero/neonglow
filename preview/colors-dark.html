<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Dark Greys</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a;font-family:var(--font-sans);color:var(--paper);}
  .wrap{padding:28px 32px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{display:flex;flex-direction:column;}
  .chip{height:96px;border:1px solid rgba(255,255,255,0.2);}
  .info{padding:10px 2px 0;}
  .name{font-size:13px;font-weight:500;color:var(--paper);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--grey-9b);margin-top:2px;}
  .role{font-size:10px;color:var(--grey-9b);margin-top:6px;line-height:1.4;}
</style></head><body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#888"></div><div class="info"><div class="name">Grey 88</div><div class="hex">#888888</div><div class="role">Dark chrome</div></div></div>
  <div class="sw"><div class="chip" style="background:#9a9a9e"></div><div class="info"><div class="name">Grey 9a</div><div class="hex">#9A9A9E</div><div class="role">Dark captions</div></div></div>
  <div class="sw"><div class="chip" style="background:#c6c6cb"></div><div class="info"><div class="name">Grey c6</div><div class="hex">#C6C6CB</div><div class="role">Dark body</div></div></div>
  <div class="sw"><div class="chip" style="background:#d8d8dc"></div><div class="info"><div class="name">Grey d8</div><div class="hex">#D8D8DC</div><div class="role">Dark body emph</div></div></div>
</div>
</body></html>
