<!-- @dsCard group="Spacing" viewport="700x280" name="Spacing scale" subtitle="4 → 100 px" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);font-family:var(--font-sans);color:var(--ink);}
  .wrap{padding:20px 32px;display:flex;flex-direction:column;gap:10px;}
  .row{display:grid;grid-template-columns:50px 1fr 1fr;gap:14px;align-items:center;font-family:var(--font-mono);}
  .tok{font-size:12px;font-weight:700;color:var(--ink);}
  .bar{height:10px;background:var(--ink);}
  .use{font-family:var(--font-sans);font-size:12px;color:var(--ink-3);}
</style></head><body>
<div class="wrap">
  <div class="row"><span class="tok">4</span><span class="bar" style="width:4px"></span><span class="use">—</span></div>
  <div class="row"><span class="tok">8</span><span class="bar" style="width:8px"></span><span class="use">Nested inline items</span></div>
  <div class="row"><span class="tok">14</span><span class="bar" style="width:14px"></span><span class="use">Label → value gap</span></div>
  <div class="row"><span class="tok">20</span><span class="bar" style="width:20px"></span><span class="use">Table row padding</span></div>
  <div class="row"><span class="tok">28</span><span class="bar" style="width:28px"></span><span class="use">Eyebrow → title</span></div>
  <div class="row"><span class="tok">40</span><span class="bar" style="width:40px"></span><span class="use">Title → body</span></div>
  <div class="row"><span class="tok">56</span><span class="bar" style="width:56px"></span><span class="use">Section → section</span></div>
  <div class="row"><span class="tok">100</span><span class="bar" style="width:100px"></span><span class="use">Slide gutter</span></div>
</div>
</body></html>
