<!-- @dsCard group="Colors" viewport="700x180" name="Performance states" subtitle="Accent · Up · Neutral · Muted · Dark" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Performance States</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);font-family:var(--font-sans);color:var(--ink);}
  .wrap{padding:24px 28px;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;background:#0a0a0a;border:1px solid #0a0a0a;margin:20px;}
  .cell{padding:16px;min-height:104px;display:flex;flex-direction:column;gap:6px;}
  .lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:500;}
  .val{font-size:30px;font-weight:500;letter-spacing:-0.03em;line-height:0.95;font-variant-numeric:tabular-nums;}
  .nm{font-size:11px;color:var(--ink-3);}
  .accent{background:#7BF076;}
  .accent .lbl{color:#0a0a0a;font-weight:700;}
  .up{background:#d4f5d1;}
  .neutral{background:#ffffff;}
  .muted{background:#eeeef0;}
  .dark{background:#0a0a0a;color:#ffffff;}
  .dark .lbl{color:#9a9a9e;}
  .dark .val{color:#7BF076;}
  .dark .nm{color:#9a9a9e;}
</style></head><body>
<div class="wrap">
  <div class="cell accent"><div class="lbl">Exited</div><div class="val">14.58×</div><div class="nm">Featured</div></div>
  <div class="cell up"><div class="lbl">Up</div><div class="val">5.26×</div><div class="nm">Marking up</div></div>
  <div class="cell neutral"><div class="lbl">Active</div><div class="val">1.00×</div><div class="nm">At cost</div></div>
  <div class="cell muted"><div class="lbl">Written off</div><div class="val">0.00×</div><div class="nm">Inactive</div></div>
  <div class="cell dark"><div class="lbl">Hero</div><div class="val">14.58×</div><div class="nm">Exit</div></div>
</div>
</body></html>
