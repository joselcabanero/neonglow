<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Ink Tints</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);font-family:var(--font-sans);}
  .wrap{padding:28px 32px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{display:flex;flex-direction:column;}
  .chip{height:96px;border:1px solid rgba(10,10,10,0.12);}
  .info{padding:10px 2px 0;}
  .name{font-size:13px;font-weight:500;color:var(--ink);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);margin-top:2px;}
  .var{font-family:var(--font-mono);font-size:10px;color:var(--ink);background:var(--paper-2);display:inline-block;padding:2px 6px;margin-top:6px;}
</style></head><body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#2a2a2a"></div><div class="info"><div class="name">Ink 2</div><div class="hex">#2A2A2A</div><span class="var">--ink-2</span></div></div>
  <div class="sw"><div class="chip" style="background:#555"></div><div class="info"><div class="name">Ink 3</div><div class="hex">#555555</div><span class="var">--ink-3</span></div></div>
  <div class="sw"><div class="chip" style="background:#e0e0e4"></div><div class="info"><div class="name">Paper 3</div><div class="hex">#E0E0E4</div><span class="var">--paper-3</span></div></div>
  <div class="sw"><div class="chip" style="background:#d4f5d1"></div><div class="info"><div class="name">Perf Up</div><div class="hex">#D4F5D1</div><span class="var">--perf-up</span></div></div>
</div>
</body></html>
